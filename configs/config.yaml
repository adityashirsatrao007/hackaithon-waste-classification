# Training configuration
model:
  name: resnet18
  pretrained: false
  num_classes: 6

training:
  epochs: 1
  batch_size: 16
  learning_rate: 0.0001
  seed: 42
  val_split: 0.2
  label_smoothing: 0.0

augmentation:
  resize: 224
  random_crop: 224
  h_flip: true
  rotation: 15
  color_jitter:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2

classes:
  - cardboard
  - glass
  - metal
  - paper
  - plastic
  - trash

paths:
  data_root: data
  train_dir: data/train
  test_dir: data/test
  model_dir: models
  submissions_dir: submissions
  reports_dir: reports
  evidence_dir: reports/evidence
